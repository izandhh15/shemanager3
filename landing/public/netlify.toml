# Netlify configuration for SheManager — landing page
# Proyecto de Izan Delgado (@izandhh), basado en Virtua FC de Pablo Román
# Este archivo debe estar en la raíz del directorio que Netlify despliega.
#
# En Netlify dashboard → Site configuration → Build & deploy:
#   Base directory:    landing/public   (o deja vacío si apuntas el repo aquí)
#   Build command:     (vacío)
#   Publish directory: .

[build]
  command = ""
  publish = "."

[[redirects]]
  from   = "/en"
  to     = "/index-en.html"
  status = 200

[[redirects]]
  from   = "/en/*"
  to     = "/index-en.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/*.webm"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
